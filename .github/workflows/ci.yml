name: CI — Autotests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Ruff Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install linters
        run: pip install ruff flake8

      - name: Ruff
        run: ruff check src/ tests/ --line-length 120

      - name: Flake8
        run: flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203,W503
